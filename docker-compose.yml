services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TEMP_DOWNLOAD_DIR: /tmp/downloads
    volumes:
      - downloads:/tmp/downloads
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: ./backend
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TEMP_DOWNLOAD_DIR: /tmp/downloads
    volumes:
      - downloads:/tmp/downloads
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info

  beat:
    build: ./backend
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      TEMP_DOWNLOAD_DIR: /tmp/downloads
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  redis_data:
  downloads:
